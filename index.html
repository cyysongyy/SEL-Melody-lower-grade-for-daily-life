<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和平小島 - AI 互動 SEL 教材</title>
    <style>
        :root {
            --p1: #a2d2ff; --p2: #b9fbc0; --p3: #fbf8cc; --p4: #ffcfd2; --p5: #cfbaf0;
        }
        body, html { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; background: #e0f2fe; overflow-x: hidden; }
        
        #stage {
            width: 100vw; height: 100vh;
            background: url('images/island_background.png') no-repeat center center;
            background-size: cover; display: flex; flex-direction: column; align-items: center; position: relative;
        }

        /* 頂部發光標題 */
        .header {
            margin-top: 20px; background: rgba(255,255,255,0.9);
            padding: 15px 40px; border-radius: 50px; text-align: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.8); border: 2px solid white;
            z-index: 10;
        }
        .title { margin: 0; font-size: 28px; color: #333; letter-spacing: 2px; }
        .bopo { font-size: 18px; color: #0369a1; font-weight: bold; display: block; margin-top: 5px; }

        /* 能量分數 */
        .score-board {
            position: absolute; top: 20px; left: 20px; background: white;
            padding: 10px 20px; border-radius: 30px; font-weight: bold; color: #db2777;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 20px;
        }

        /* 圖片區域：加入浮動動畫 */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-15px); } 100% { transform: translateY(0px); } }
        .display-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; width: 80%; }
        .main-img { 
            max-width: 70%; max-height: 55vh; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
            animation: float 4s ease-in-out infinite;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }
        .main-img:hover { transform: scale(1.1) rotate(2deg); filter: drop-shadow(0 0 30px rgba(255,255,255,1)); }

        /* 選單導覽 */
        .nav-container { background: rgba(255,255,255,0.6); backdrop-filter: blur(5px); width: 100%; padding: 15px 0; border-top: 2px solid rgba(255,255,255,0.5); }
        .time-nav { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .time-btn { border: 2px solid white; padding: 12px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .time-btn:hover { transform: scale(1.05); }

        .action-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 900px; margin: 0 auto; }
        .action-btn {
            background: white; border: none; padding: 10px 18px;
            border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 500;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.2s;
        }
        .action-btn:hover { background: #333; color: white; transform: translateY(-3px); }

        /* 粒子效果容器 */
        #particle-container { position: absolute; width: 100%; height: 100%; pointer-events: none; }
    </style>
</head>
<body>

<div id="stage">
    <div id="particle-container"></div>
    
    <div class="score-board">✨ 能量點數: <span id="score">0</span></div>

    <div class="header">
        <h1 id="txt-zh" class="title">和平小島冒險</h1>
        <span id="txt-bp" class="bopo">ㄏㄜˊ ㄆㄧㄥˊ ㄒㄧㄠˇ ㄉㄠˇ ㄇㄠˋ ㄒㄧㄢˇ</span>
    </div>

    <div class="display-area">
        <img id="img-target" src="images/ui_start_button.png" class="main-img" onclick="playVoice()">
    </div>

    <div class="nav-container">
        <div class="time-nav">
            <button class="time-btn" style="background:var(--p1)" onclick="showActions(1)">☀️ 早安出發</button>
            <button class="time-btn" style="background:var(--p2)" onclick="showActions(2)">🍭 午後靜心</button>
            <button class="time-btn" style="background:var(--p3)" onclick="showActions(3)">🏃 活動降溫</button>
            <button class="time-btn" style="background:var(--p4)" onclick="showActions(4)">✍️ 聯絡簿</button>
            <button class="time-btn" style="background:var(--p5)" onclick="showActions(5)">🎒 快樂回家</button>
        </div>
        <div id="action-box" class="action-nav"></div>
    </div>
</div>

<script>
    let score = 0;
    const database = { /* 此處沿用您提供的 25 條數據，僅示範一組 */
        1: [
            { t: "主動交作業", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄗㄨˋ ㄉㄨㄥˋ ㄐㄧㄠ ㄗㄨㄛˋ ㄧㄝˋ", i: "morning_01_pack.png", s: "我會主動交作業" },
            { t: "收好桌面", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄕㄡ ㄏㄠˇ ㄓㄨㄛ ㄇㄧㄢˋ", i: "morning_02_desk.png", s: "我會收好桌面" },
            { t: "安靜進教室", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄢ ㄐㄧㄥˋ ㄐㄧㄣˋ ㄐㄧㄠˋ ㄕˋ", i: "morning_03_quiet.png", s: "我會安靜進教室" },
            { t: "向老師問好", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄒㄧㄤˋ ㄌㄠˇ ㄕ ㄨㄣˋ ㄏㄠˇ", i: "morning_04_greeting.png", s: "我會向老師問好" },
            { t: "準備好課本", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄓㄨㄣˇ ㄅㄟˋ ㄏㄠˇ ㄎㄜˋ ㄅㄣˇ", i: "morning_05_prepare.png", s: "我會準備好課本" }
        ],
        // ... (其餘 2~5 時段依此類推加入 s 屬性即讀音內容)
    };

    function showActions(id) {
        const box = document.getElementById('action-box');
        box.innerHTML = "";
        database[id].forEach(item => {
            const btn = document.createElement('button');
            btn.className = "action-btn";
            btn.innerText = item.t;
            btn.onclick = () => updateDisplay(item);
            box.appendChild(btn);
        });
    }

    function updateDisplay(item) {
        document.getElementById('txt-zh').innerText = item.t;
        document.getElementById('txt-bp').innerText = item.b;
        const img = document.getElementById('img-target');
        img.src = "images/" + item.i;
        
        // 增加分數
        score += 10;
        document.getElementById('score').innerText = score;
        
        // 播放 AI 語音
        const msg = new SpeechSynthesisUtterance(item.s || item.t);
        msg.lang = 'zh-TW';
        msg.rate = 0.8;
        window.speechSynthesis.speak(msg);
        
        // 噴發能量球粒子
        createParticles();
    }

    function createParticles() {
        const container = document.getElementById('particle-container');
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('img');
            p.src = "images/cool_prop_pink_energy_ball.png";
            p.style.position = "absolute";
            p.style.width = "40px";
            p.style.left = "50%";
            p.style.top = "50%";
            p.style.transition = "all 1s ease-out";
            container.appendChild(p);

            const angle = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 200;
            setTimeout(() => {
                p.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                p.style.opacity = "0";
            }, 50);
            setTimeout(() => p.remove(), 1000);
        }
    }
</script>
</body>
</html>
