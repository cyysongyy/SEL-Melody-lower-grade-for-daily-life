<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和平小島 - 精緻平衡版</title>
    <style>
        :root {
            --p1: #a2d2ff; --p2: #b9fbc0; --p3: #fbf8cc; --p4: #ffcfd2; --p5: #cfbaf0;
        }
        body, html { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; background: #e0f2fe; overflow: hidden; height: 100%; }
        
        #stage {
            width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 50%, #e0f2fe 100%), url('images/island_background.png');
            background-repeat: no-repeat; background-position: center; background-size: cover;
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        /* 標題與分數：保持精簡提升 */
        .header {
            margin-top: 15px; background: rgba(255,255,255,0.9);
            padding: 8px 25px; border-radius: 40px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 2px solid white; z-index: 10;
        }
        .title { margin: 0; font-size: 20px; color: #333; }
        .bopo { font-size: 13px; color: #0369a1; font-weight: bold; display: block; }

        .score-board {
            position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.9);
            padding: 6px 12px; border-radius: 25px; font-weight: bold; color: #db2777; font-size: 14px;
        }

        /* 圖片區域：縮小至 1/2，並確保有足夠的下邊距避免重疊 */
        .display-area { 
            flex-grow: 1; display: flex; justify-content: center; align-items: center; 
            width: 100%; padding-bottom: 120px; /* 留出空間給下方的 nav */
        }
        .main-img { 
            max-width: 45%; /* 略小於 1/2，更精緻 */
            max-height: 40vh; 
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
            cursor: pointer;
            mix-blend-mode: multiply; /* 模擬去背 */
        }

        /* 選單容器：適中尺寸，固定在下方 */
        .nav-container {
            background: rgba(255,255,255,0.7); backdrop-filter: blur(10px);
            width: 100%; padding: 15px 0;
            border-top: 2px solid rgba(255,255,255,0.5);
            position: absolute; bottom: 5vh; /* 回到較低位置但維持間距 */
            z-index: 20;
        }

        /* 五大選項：尺寸調適中，不壓迫圖片 */
        .time-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 12px; }
        .time-btn {
            border: none; padding: 8px 18px; border-radius: 20px; cursor: pointer;
            font-weight: bold; font-size: 16px; /* 縮小字體回到適中大小 */
            transition: 0.3s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .time-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 10px rgba(0,0,0,0.15); }

        /* 次連結按鈕：字體 16px */
        .action-nav { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; 
            max-width: 900px; margin: 0 auto; min-height: 40px; 
        }
        .action-btn {
            background: white; border: 1px solid #eee; padding: 8px 16px;
            border-radius: 12px; cursor: pointer; font-size: 16px;
            font-weight: 600; color: #444; transition: 0.2s;
        }
        .action-btn:hover { background: #333; color: white; }

        .particle { position: absolute; pointer-events: none; width: 40px; transition: all 0.8s ease-out; opacity: 1; z-index: 5; }
    </style>
</head>
<body>

<div id="stage">
    <div class="score-board">✨ 能量點數: <span id="score">0</span></div>
    <div class="header">
        <h1 id="txt-zh" class="title">和平小島冒險</h1>
        <span id="txt-bp" class="bopo">ㄏㄜˊ ㄆㄧㄥˊ ㄒㄧㄠˇ ㄉㄠˇ ㄇㄠˋ ㄒㄧㄢˇ</span>
    </div>
    <div class="display-area">
        <img id="img-target" src="images/ui_start_button.png" class="main-img" onclick="playCurrentVoice()">
    </div>
    <div class="nav-container">
        <div class="time-nav">
            <button class="time-btn" style="background:var(--p1)" onclick="loadActions(1)">☀️ 早安</button>
            <button class="time-btn" style="background:var(--p2)" onclick="loadActions(2)">🍭 靜心</button>
            <button class="time-btn" style="background:var(--p3)" onclick="loadActions(3)">🏃 降溫</button>
            <button class="time-btn" style="background:var(--p4)" onclick="loadActions(4)">✍️ 聯絡簿</button>
            <button class="time-btn" style="background:var(--p5)" onclick="loadActions(5)">🎒 回家</button>
        </div>
        <div id="action-box" class="action-nav">
            <p style="color:#666; font-weight:bold; font-size:15px; margin:0;">點擊上方時段開啟小任務</p>
        </div>
    </div>
</div>

<script>
    let score = 0;
    let currentVoiceText = "歡迎來到和平小島！";

    const database = {
        1: [
            { t: "主動交作業", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄗㄨˋ ㄉㄨㄥˋ ㄐㄧㄠ ㄗㄨㄛˋ ㄧㄝˋ", i: "morning_01_homework.png" },
            { t: "收好桌面", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄕㄡ ㄏㄠˇ ㄓㄨㄛ ㄇㄧㄢˋ", i: "morning_02_desk.png" },
            { t: "安靜進教室", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄢ ㄐㄧㄥˋ ㄐㄧㄣˋ ㄐㄧㄠˋ ㄕˋ", i: "morning_03_quiet.png" },
            { t: "向老師問好", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄒㄧㄤˋ ㄌㄠˇ ㄕ ㄨㄣˋ ㄏㄠˇ", i: "morning_04_greeting.png" },
            { t: "準備好課本", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄓㄨㄣˇ ㄅㄟˋ ㄏㄠˇ ㄎㄜˋ ㄅㄣˇ", i: "morning_05_prepare.png" }
        ],
        2: [
            { t: "收好午睡枕", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄕㄡ ㄏㄠˇ ㄨˇ ㄕㄨㄟˋ ㄓㄣˇ", i: "afternoon_01_pillow.png" },
            { t: "喝水上廁所", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄑㄩˋ ㄏㄜ ㄕㄨㄟˇ ㄕㄤˋ ㄘㄜˋ ㄙㄨㄛˇ", i: "afternoon_02_water.png" },
            { t: "聽清楚指令", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄊㄧㄥ ㄑㄧㄥ ㄔㄨˇ ㄌㄠˇ ㄕ ㄕㄨㄛ ㄏㄨㄚˋ", i: "afternoon_03_listen.png" },
            { t: "排隊不推擠", b: "ㄆㄞˊ ㄉㄨㄟˋ ㄕˊ ㄅㄨˋ ㄊㄨㄟ ㄐㄧˇ", i: "afternoon_04_lineup.png" },
            { t: "喚醒小腦袋", b: "ㄖㄤˋ ㄉㄚˋ ㄋㄠˇ ㄒㄧㄥˇ ㄍㄨㄛˋ ㄌㄞˊ", i: "afternoon_05_wakeup.png" }
        ],
        3: [
            { t: "輪流玩玩具", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄌㄨㄣˊ ㄌㄧㄡˊ ㄨㄢˊ ㄨㄢˊ ㄐㄩˋ", i: "cool_01_turns.png" },
            { t: "輸了不生氣", b: "ㄅㄧˇ ㄙㄞˋ ㄕㄨ ㄌㄜ˙ ㄅㄨˋ ㄕㄥ ㄑㄧˋ", i: "cool_02_lose.png" },
            { t: "借東西要問", b: "ㄐㄧㄝˋ ㄉㄨㄥ ㄒㄧ ㄧㄠˋ ㄒㄧㄢ ㄨㄣˋ", i: "cool_03_ask.png" },
            { t: "一起想辦法", b: "ㄨㄛˇ ㄇㄣ˙ ㄧˋ ㄑㄧˇ ㄒㄧㄤˇ ㄅㄢˋ ㄈㄚˇ", i: "cool_04_solution.png" },
            { t: "把話說清楚", b: "ㄩㄥˋ ㄕㄨㄛ ㄉㄜ˙ ㄅㄨˋ ㄩㄥˋ ㄎㄨ ㄉㄜ˙", i: "cool_05_talk.png" }
        ],
        4: [
            { t: "字跡寫漂亮", b: "ㄗˋ ㄒㄧㄝˇ ㄆㄧㄠˋ ㄌㄧㄤ˙ ㄇㄚ˙ ？", i: "notebook_01_neat.png" },
            { t: "日期對了嗎", b: "ㄖˋ ㄑㄧˊ ㄉㄨㄟˋ ㄌㄜ˙ ㄇㄚ˙ ？", i: "notebook_02_date.png" },
            { t: "項目抄齊了", b: "ㄒㄧㄤˋ ㄇㄨˋ ㄉㄡ ㄔㄠ ㄏㄠˇ ㄌㄜ˙ ㄇㄚ˙ ？", i: "notebook_03_complete.png" },
            { t: "幫同學檢查", b: "ㄅㄤ ㄊㄨㄥˊ ㄒㄩㄝˊ ㄐㄧㄢˇ ㄔㄚˊ", i: "notebook_04_helper.png" },
            { t: "桌面清乾淨", b: "ㄓㄨㄛ ㄇㄧㄢˋ ㄅㄠˇ ㄔˊ ㄍㄢ ㄐㄧㄥˋ", i: "notebook_05_clean.png" }
        ],
        5: [
            { t: "東西帶齊了", b: "ㄉㄨㄥ ㄒㄧ ㄉㄡ ㄉㄞˋ ㄑㄧˊ ㄌㄜ˙ ㄇㄚ˙ ？", i: "home_01_pack.png" },
            { t: "垃圾隨手收", b: "ㄌㄜˋ ㄙㄜˋ ㄙㄨㄟˊ ㄕㄡˇ ㄕㄡ ㄏㄠˇ", i: "home_02_trash.png" },
            { t: "謝謝好朋友", b: "ㄒㄧㄝˋ ㄒㄧㄝˋ ㄅㄤ ㄨㄛˇ ㄉㄜ˙ ㄖㄣˊ", i: "home_03_thanks.png" },
            { t: "明天見微笑", b: "ㄏㄢˊ ㄌㄠˇ ㄕ ㄕㄨㄛ ㄗㄞˋ ㄐㄧㄢˋ", i: "home_04_smile.png" },
            { t: "我今天很努力", b: "ㄨㄛˇ ㄐㄧㄣ ㄊㄧㄢ ㄏㄣˇ ㄋㄨˇ ㄌㄧˋ", i: "home_05_proud.png" }
        ]
    };

    function loadActions(id) {
        const box = document.getElementById('action-box');
        box.innerHTML = ""; 
        if (database[id]) {
            database[id].forEach(item => {
                const btn = document.createElement('button');
                btn.className = "action-btn";
                btn.innerText = item.t;
                btn.onclick = function() { displayEffect(item); };
                box.appendChild(btn);
            });
        }
    }

    function displayEffect(item) {
        document.getElementById('txt-zh').innerText = item.t;
        document.getElementById('txt-bp').innerText = item.b;
        document.getElementById('img-target').src = "images/" + item.i;
        currentVoiceText = item.t;
        score += 10;
        document.getElementById('score').innerText = score;
        playCurrentVoice();
        spawnParticles();
    }

    function playCurrentVoice() {
        const msg = new SpeechSynthesisUtterance(currentVoiceText);
        msg.lang = 'zh-TW';
        window.speechSynthesis.speak(msg);
    }

    function spawnParticles() {
        const stage = document.getElementById('stage');
        for(let i=0; i<8; i++) {
            const p = document.createElement('img');
            p.src = "images/cool_prop_pink_energy_ball.png";
            p.className = "particle";
            p.style.left = "50%"; p.style.top = "50%";
            stage.appendChild(p);
            const ang = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 150;
            setTimeout(() => {
                p.style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
                p.style.opacity = "0";
            }, 50);
            setTimeout(() => p.remove(), 1000);
        }
    }
</script>
</body>
</html>
