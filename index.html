<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>和平小島 - 流動魔法 SEL 教材</title>
    <style>
        :root {
            --p1-base: #a2d2ff; --p2-base: #b9fbc0; --p3-base: #fbf8cc;
            --p4-base: #ffcfd2; --p5-base: #cfbaf0;
        }

        body, html { margin: 0; padding: 0; font-family: "Microsoft JhengHei", sans-serif; background: #e0f2fe; overflow: hidden; height: 100%; }
        
        #stage {
            width: 100vw; height: 100vh;
            /* 背景加入輕微的流動色彩 */
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 50%, #e0f2fe 100%), url('images/island_background.png');
            background-repeat: no-repeat; background-position: center; background-size: cover;
            display: flex; flex-direction: column; align-items: center; position: relative;
        }

        /* 頂部標題與分數：提升層次 */
        .header {
            margin-top: 15px; background: rgba(255,255,255,0.9);
            padding: 10px 30px; border-radius: 40px; text-align: center;
            box-shadow: 0 0 25px rgba(255,255,255,0.7); border: 2px solid white; z-index: 20; /* 層次提升 */
        }
        .title { margin: 0; font-size: 22px; color: #333; }
        .bopo { font-size: 14px; color: #0369a1; font-weight: bold; display: block; margin-top: 3px; }

        .score-board {
            position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.9);
            padding: 8px 15px; border-radius: 25px; font-weight: bold; color: #db2777; font-size: 16px;
            z-index: 20; /* 層次提升 */
        }

        /* 圖片區域：圖片縮小到原本的 1/2 (50%) */
        .display-area { flex-grow: 1; display: flex; justify-content: center; align-items: center; width: 80%; z-index: 10; }
        .main-img { 
            max-width: 50%; /* 關鍵：縮小至 1/2 */
            max-height: 45vh; /* 關鍵：縮小至 1/2 */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            /* 模擬去背 */
            mix-blend-mode: multiply; background-color: white; border-radius: 20px;
        }
        .main-img:active { transform: scale(0.95); }

        /* 選單導覽：大幅提升位置與層次 */
        .nav-container {
            background: rgba(255,255,255,0.7); backdrop-filter: blur(8px);
            width: 100%; padding: 20px 0;
            border-top: 2px solid rgba(255,255,255,0.4);
            position: absolute; bottom: 12vh; /* 提升位置 */
            z-index: 30; /* 層次最高，確保不會重疊 */
        }

        /* 時段選單與次連結：放大文字 */
        .time-nav { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .time-btn {
            border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer;
            font-weight: bold; font-size: 18px; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .time-btn:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.2); }

        .action-nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; max-width: 950px; margin: 0 auto; min-height: 50px; }
        .action-btn {
            background: white; border: 1px solid #eee; padding: 10px 18px;
            border-radius: 15px; cursor: pointer; font-size: 18px; /* 字體放大 */
            font-weight: 600; color: #444; transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }
        .action-btn:hover { background: #333 !important; color: white !important; transform: translateY(-3px); box-shadow: 0 4px 8px rgba(0,0,0,0.08); }

        .particle { position: absolute; pointer-events: none; width: 40px; transition: all 0.8s ease-out; opacity: 1; z-index: 5; }
    </style>
</head>
<body>

<div id="stage">
    <div class="score-board">✨ 能量點數: <span id="score">0</span></div>
    <div class="header">
        <h1 id="txt-zh" class="title">和平小島冒險</h1>
        <span id="txt-bp" class="bopo">ㄏㄜˊ ㄆㄧㄥˊ ㄒㄧㄠˇ ㄉㄠˇ ㄇㄠˋ ㄒㄧㄢˇ</span>
    </div>
    <div class="display-area">
        <img id="img-target" src="images/ui_start_button.png" class="main-img" onclick="playCurrentVoice()">
    </div>
    <div class="nav-container">
        <div class="time-nav">
            <button class="time-btn" style="background:var(--p1-base)" onclick="loadActions(1)">☀️ 早安</button>
            <button class="time-btn" style="background:var(--p2-base)" onclick="loadActions(2)">🍭 靜心</button>
            <button class="time-btn" style="background:var(--p3-base)" onclick="loadActions(3)">🏃 降溫</button>
            <button class="time-btn" style="background:var(--p4-base)" onclick="loadActions(4)">✍️ 聯絡簿</button>
            <button class="time-btn" style="background:var(--p5-base)" onclick="loadActions(5)">🎒 回家</button>
        </div>
        <div id="action-box" class="action-nav">
            <p style="color:#666; margin:0; font-size:18px; font-weight:bold;">點擊上方時段開啟任務！</p>
        </div>
    </div>
</div>

<script>
    let score = 0;
    let currentVoiceText = "歡迎來到和平小島！";

    // 資料庫
    const database = {
        1: [
            // 將檔名從 morning_01_pack.png 修改為 morning_01_homework.png
            { t: "主動交作業", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄗㄨˋ ㄉㄨㄥˋ ㄐㄧㄠ ㄗㄨㄛˋ ㄧㄝˋ", i: "morning_01_homework.png" },
            { t: "收好桌面", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄕㄡ ㄏㄠˇ ㄓㄨㄛ ㄇㄧㄢˋ", i: "morning_02_desk.png" },
            { t: "安靜進教室", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄢ ㄐㄧㄥˋ ㄐㄧㄣˋ ㄐㄧㄠˋ ㄕˋ", i: "morning_03_quiet.png" },
            { t: "向老師問好", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄒㄧㄤˋ ㄌㄠˇ ㄕ ㄨㄣˋ ㄏㄠˇ", i: "morning_04_greeting.png" },
            { t: "準備好課本", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄓㄨㄣˇ ㄅㄟˋ ㄏㄠˇ ㄎㄜˋ ㄅㄣˇ", i: "morning_05_prepare.png" }
        ],
        // 其餘 database 保持不變 (數據沿用舊代碼)
        2: [
            { t: "收好午睡枕", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄕㄡ ㄏㄠˇ ㄨˇ ㄕㄨㄟˋ ㄓㄣˇ", i: "afternoon_01_pillow.png" },
            { t: "喝水上廁所", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄑㄩˋ ㄏㄜ ㄕㄨㄟˇ ㄕㄤˋ ㄘㄜˋ ㄙㄨㄛˇ", i: "afternoon_02_water.png" },
            { t: "聽清楚指令", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄊㄧㄥ ㄑㄧㄥ ㄔㄨˇ ㄌㄠˇ ㄕ ㄕㄨㄛ ㄏㄨㄚˋ", i: "afternoon_03_listen.png" },
            { t: "排隊不推擠", b: "ㄆㄞˊ ㄉㄨㄟˋ ㄕˊ ㄅㄨˋ ㄊㄨㄟ ㄐㄧˇ", i: "afternoon_04_lineup.png" },
            { t: "喚醒小腦袋", b: "ㄖㄤˋ ㄉㄚˋ ㄋㄠˇ ㄒㄧㄥˇ ㄍㄨㄛˋ ㄌㄞˊ", i: "afternoon_05_wakeup.png" }
        ],
        3: [
            { t: "輪流玩玩具", b: "ㄨㄛˇ ㄏㄨㄟˋ ㄌㄨㄣˊ ㄌㄧㄡˊ ㄨㄢˊ ㄨㄢˊ ㄐㄩˋ", i: "cool_01_turns.png" },
            { t: "輸了不生氣", b: "ㄅㄧˇ ㄙㄞˋ 輸 ㄌㄜ˙ ㄅㄨˋ ㄕㄥ ㄑㄧˋ", i: "cool_02_lose.png" },
            { t: "借東西要先問", b: "ㄐㄧㄝˋ ㄉㄨㄥ ㄒㄧ ㄧㄠˋ ㄒㄧㄢ ㄨㄣˋ", i: "cool_03_ask.png" },
            { t: "我們一起想辦法", b: "ㄨㄛˇ ㄇㄣ˙ ㄧˋ ㄑㄧˇ ㄒㄧㄤˇ ㄅㄢˋ ㄈㄚˇ", i: "cool_04_solution.png" },
            { t: "用說的不用哭的", b: "ㄩㄥˋ ㄕㄨㄛ ㄉㄜ˙ ㄅㄨˋ ㄩㄥˋ ㄎㄨ ㄉㄜ˙", i: "cool_05_talk.png" }
        ],
        4: [
            { t: "字寫漂亮嗎？", b: "ㄗˋ ㄒㄧㄝˇ ㄆㄧㄠˋ ㄌㄧㄤ˙ ㄇㄚ˙ ？", i: "notebook_01_neat.png" },
            { t: "日期對了嗎？", b: "ㄖˋ ㄑㄧˊ ㄉㄨㄟˋ ㄌㄜ˙ ㄇㄚ˙ ？", i: "notebook_02_date.png" },
            { t: "項目都抄好了嗎？", b: "ㄒㄧㄤˋ ㄇㄨˋ ㄉㄡ ㄔㄠ ㄏㄠˇ ㄌㄜ˙ ㄇㄚ˙ ？", i: "notebook_03_complete.png" },
            { t: "幫同學檢查", b: "ㄅㄤ ㄊㄨㄥˊ ㄒㄩㄝˊ ㄐㄧㄢˇ ㄔㄚˊ", i: "notebook_04_helper.png" },
            { t: "桌面保持乾淨", b: "ㄓㄨㄛ ㄇㄧㄢˋ ㄅㄠˇ ㄔˊ ㄍㄢ ㄐㄧㄥˋ", i: "notebook_05_clean.png" }
        ],
        5: [
            { t: "東西帶齊了嗎？", b: "ㄉㄨㄥ ㄒㄧ ㄉㄡ ㄉㄞˋ ㄑㄧˊ ㄌㄜ˙ ㄇㄚ˙ ？", i: "home_01_pack.png" },
            { t: "垃圾隨手收好", b: "ㄌㄜˋ ㄙㄜˋ ㄙㄨㄟˊ ㄕㄡˇ ㄕㄡ ㄏㄠˇ", i: "home_02_trash.png" },
            { t: "謝謝幫我的人", b: "ㄒㄧㄝˋ ㄒㄧㄝˋ ㄅㄤ ㄨㄛˇ ㄉㄜ˙ ㄖㄣˊ", i: "home_03_thanks.png" },
            { t: "和老師說再見", b: "ㄏㄢˊ ㄌㄠˇ ㄕ ㄕㄨㄛ ㄗㄞˋ ㄐㄧㄢˋ", i: "home_04_smile.png" },
            { t: "我今天很努力", b: "ㄨㄛˇ ㄐㄧㄣ ㄊㄧㄢ ㄏㄣˇ ㄋㄨˇ ㄌㄧˋ", i: "home_05_proud.png" }
        ]
    };

    // JavaScript 邏輯保持不變 (數據沿用舊代碼)
    function loadActions(id) {
        const box = document.getElementById('action-box');
        box.innerHTML = "";
        database[id].forEach(item => {
            const btn = document.createElement('button');
            btn.className = "action-btn";
            btn.innerText = item.t;
            btn.onclick = () => updateDisplay(item);
            box.appendChild(btn);
        });
    }

    function updateDisplay(item) {
        document.getElementById('txt-zh').innerText = item.t;
        document.getElementById('txt-bp').innerText = item.b;
        document.getElementById('img-target').src = "images/" + item.i;
        currentVoiceText = item.t;
        score += 10;
        document.getElementById('score').innerText = score;
        playCurrentVoice();
        spawnParticles();
    }

    function playCurrentVoice() {
        const msg = new SpeechSynthesisUtterance(currentVoiceText);
        msg.lang = 'zh-TW';
        msg.rate = 0.9;
        window.speechSynthesis.speak(msg);
    }

    function spawnParticles() {
        const stage = document.getElementById('stage');
        for(let i=0; i<8; i++) {
            const p = document.createElement('img');
            p.src = "images/cool_prop_pink_energy_ball.png";
            p.className = "particle";
            p.style.left = "50%"; p.style.top = "50%";
            stage.appendChild(p);
            const ang = Math.random() * Math.PI * 2;
            const dist = 100 + Math.random() * 150;
            setTimeout(() => {
                p.style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
                p.style.opacity = "0";
            }, 50);
            setTimeout(() => p.remove(), 1000);
        }
    }
</script>
</body>
</html>
